<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D5DFC" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6D5DFC" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0A0A0A" />
  
  <!-- Outer glowing rings -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#glow)" stroke-width="4" stroke-opacity="0.1" />

  <!-- QR Pattern Grid Shape -->
  <g fill="url(#glow)" filter="url(#shadow)">
    <!-- Top-Left Finder -->
    <rect x="96" y="96" width="112" height="112" rx="24" />
    <rect x="120" y="120" width="64" height="64" rx="12" fill="#0A0A0A" />
    <rect x="136" y="136" width="32" height="32" rx="6" />

    <!-- Top-Right Finder -->
    <rect x="304" y="96" width="112" height="112" rx="24" />
    <rect x="328" y="120" width="64" height="64" rx="12" fill="#0A0A0A" />
    <rect x="344" y="136" width="32" height="32" rx="6" />

    <!-- Bottom-Left Finder -->
    <rect x="96" y="304" width="112" height="112" rx="24" />
    <rect x="120" y="328" width="64" height="64" rx="12" fill="#0A0A0A" />
    <rect x="136" y="344" width="32" height="32" rx="6" />

    <!-- Alignment / Custom Code Blocks -->
    <rect x="344" y="344" width="48" height="48" rx="12" />
    <rect x="360" y="360" width="16" height="16" rx="4" fill="#0A0A0A" />

    <!-- Random QR Module Dots -->
    <rect x="240" y="96" width="32" height="32" rx="8" />
    <rect x="240" y="176" width="32" height="32" rx="8" />
    <rect x="176" y="240" width="32" height="32" rx="8" />
    <rect x="96" y="240" width="32" height="32" rx="8" />
    
    <rect x="240" y="240" width="32" height="32" rx="8" />
    <rect x="304" y="240" width="32" height="32" rx="8" />
    
    <rect x="240" y="304" width="32" height="32" rx="8" />
    <rect x="240" y="384" width="32" height="32" rx="8" />
    <rect x="304" y="304" width="32" height="32" rx="8" />
    <rect x="384" y="240" width="32" height="32" rx="8" />
    <rect x="384" y="304" width="32" height="32" rx="8" />
  </g>
</svg>
